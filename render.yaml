services:
  # Backend API Service
  - type: web
    name: docuforge-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: AI_MODEL
        value: tinyllama:latest
      - key: AI_TIMEOUT
        value: 90000
      - key: SESSION_TTL
        value: 3600
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_DIR
        value: ./uploads/temp
      - key: RENDER
        value: true
      - key: IS_RENDER
        value: true
    healthCheckPath: /api/health

  # Frontend Static Service
  - type: static
    name: docuforge-frontend
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://docuforge-backend.onrender.com/api
      - key: RENDER
        value: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html